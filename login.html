<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Giriş</title>
</head>
<body style="font-family:Arial,sans-serif;max-width:400px;margin:60px auto;padding:20px;">
  <h2>Admin Giriş</h2>

  <input id="email" type="email" placeholder="E-posta" style="width:100%;padding:10px;margin-bottom:10px;"><br>
  <input id="password" type="password" placeholder="Şifre" style="width:100%;padding:10px;margin-bottom:10px;"><br>

  <button onclick="girisYap()" style="width:100%;padding:10px;background:#0ea5a4;color:#fff;border:none;border-radius:8px;">
    Giriş Yap
  </button>

  <p id="mesaj" style="color:red;"></p>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDJgao5IdNccsuctl9vojXf8GuJPaMdrsk",
      authDomain: "sigortaacentam-9e228.firebaseapp.com",
      projectId: "sigortaacentam-9e228",
      storageBucket: "sigortaacentam-9e228.firebasestorage.app",
      messagingSenderId: "518793231741",
      appId: "1:518793231741:web:39a3908c182a509a8d2014"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function girisYap() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = "admin.html";
        })
        .catch(() => {
          document.getElementById("mesaj").textContent = "E-posta veya şifre hatalı.";
        });
    }
  </script>
</body>
</html>
